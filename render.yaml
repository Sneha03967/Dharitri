services:
  # ── Backend (FastAPI) ──────────────────────────────────────────
  - type: web
    name: dharitri-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
    healthCheckPath: /health

  # ── Frontend (React static site) ──────────────────────────────
  - type: web
    name: dharitri-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://dharitri-backend.onrender.com   # update after backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html